name: Regimo Wohnungs-Alarm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regimo-alert
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install beautifulsoup4

      - name: Auf neue Inserate pruefen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python regimo_alert.py

      - name: Zustand sichern
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "regimo-alert-bot"
            git config user.email "bot@users.noreply.github.com"
            git add seen.json
            git commit -m "Zustand aktualisiert [skip ci]"
            git push
          else
            echo "Keine Aenderung am Zustand."
          fi
